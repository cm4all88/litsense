<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080604" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS specific ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LitSense" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── SEO / Share ── -->
    <title>LitSense — Books worth your time</title>
    <meta name="description" content="Your personal reading intelligence. Books recommended for you, with a real explanation why." />
    <meta property="og:title" content="LitSense" />
    <meta property="og:description" content="Books recommended for you, with a real explanation why." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:url" content="https://litsense.app" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
